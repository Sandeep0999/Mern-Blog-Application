<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Premium Gold-to-Amber Gradient -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d" />
      <stop offset="35%" stop-color="#fbbf24" />
      <stop offset="70%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <!-- Soft Glow Filter to make it stand out against both light & dark browser tabs -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- outer glowing aura ring -->
  <circle cx="256" cy="256" r="226" fill="none" stroke="url(#goldGradient)" stroke-width="20" filter="url(#glow)" opacity="0.9" />
  
  <!-- Delicate dotted detail ring -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="url(#goldGradient)" stroke-width="3" stroke-dasharray="10, 20" opacity="0.7" />

  <!-- Highly-Scalable Premium Fountain Pen Nib (Symmetric) -->
  <g transform="translate(0, 0)">
    <!-- Base plate of the gold nib -->
    <path d="M 256,120 L 160,330 L 195,360 L 195,430 L 317,430 L 317,360 L 352,330 Z" fill="url(#goldGradient)" />
    
    <!-- Central slit cut-out (classic nib dividing line) -->
    <rect x="253" y="120" width="6" height="190" fill="#0c0e14" rx="2" />
    
    <!-- Circular breather hole in the center of the nib -->
    <circle cx="256" cy="306" r="16" fill="#0c0e14" />

    <!-- Sleek designer horizontal lines to enhance details in gold nib base -->
    <path d="M 215,360 H 297" stroke="#0c0e14" stroke-width="8" stroke-linecap="round" />
    <path d="M 225,390 H 287" stroke="#0c0e14" stroke-width="6" stroke-linecap="round" />
  </g>

  <!-- Glowing bright white inspiration spark/droplet at the writing tip -->
  <circle cx="256" cy="100" r="14" fill="#ffffff" filter="url(#glow)" />
</svg>
